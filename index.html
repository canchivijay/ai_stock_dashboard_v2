
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stock Analysis Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>NSE AI Market Scanner</h2>

<button onclick="startScanner()">Scan Entire NSE Market</button>

<table border="1" style="width:100%; margin-top:20px;">

<thead>
<tr>
<th>Stock</th>
<th>Price</th>
<th>RSI</th>
<th>MACD</th>
<th>Breakout</th>
<th>Volume Spike</th>
<th>Score</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<section class="search">
<input id="symbolInput" placeholder="Example: RELIANCE.BSE">
<button onclick="analyzeStock()">Analyze</button>
</section>

<section class="card">
<h2>Live Price</h2>
<p id="price">--</p>
</section>

<section class="card">
<h2>Indicators</h2>
<p>RSI: <span id="rsi">--</span></p>
<p>MACD: <span id="macd">--</span></p>
<p>Trend: <span id="trend">--</span></p>
</section>

<section class="card">
<h2>Signals</h2>
<p>Intraday: <span id="intraday">--</span></p>
<p>Short Term: <span id="shortterm">--</span></p>
<p>Long Term: <span id="longterm">--</span></p>
</section>

<section class="card">
<h2>Support / Resistance</h2>
<p>Support: <span id="support">--</span></p>
<p>Resistance: <span id="resistance">--</span></p>
</section>

<script src="script.js"></script>

</body>
</html>
