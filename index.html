<!DOCTYPE html>
<html>
<head>

<title>AI Stock Analysis Dashboard V5</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>AI Stock Analysis Dashboard</h1>

<div class="search">

<input id="symbolInput" placeholder="Enter NSE stock (RELIANCE)">

<button onclick="analyzeStock()">Analyze</button>

</div>


<div class="card">

<h2>Live Price</h2>

<div id="price">--</div>

</div>


<div class="card">

<h2>Indicators</h2>

RSI: <span id="rsi">--</span><br>
MACD: <span id="macd">--</span><br>
Trend: <span id="trend">--</span>

</div>


<div class="card">

<h2>Signals</h2>

Intraday: <span id="intraday">--</span><br>
Short Term: <span id="shortterm">--</span><br>
Long Term: <span id="longterm">--</span>

</div>


<div class="card">

<h2>Stock Chart</h2>

<div id="chart" style="height:400px;"></div>

</div>


<div class="card">

<h2>NSE Market Scanner</h2>

<button onclick="scanMarket()">Scan Market</button>

<table>

<thead>
<tr>
<th>Stock</th>
<th>Price</th>
<th>RSI</th>
<th>Breakout</th>
<th>Score</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

</div>


<script src="script.js"></script>

</body>
</html>
